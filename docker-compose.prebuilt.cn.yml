services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prebuilt.cn
      args:
        S3MS_BINARY: ${S3MS_PREBUILT_BINARY:-deploy/prebuilt/s3-message-service}
        DEBIAN_IMAGE: ${S3MS_DEBIAN_IMAGE:-m.daocloud.io/docker.io/library/debian:bookworm-slim}
        DEBIAN_MIRROR: ${S3MS_DEBIAN_MIRROR:-http://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${S3MS_DEBIAN_SECURITY_MIRROR:-http://mirrors.aliyun.com/debian-security}
    image: s3-message-service:prebuilt-cn
    restart: unless-stopped
    env_file:
      - ${S3MS_ENV_FILE:-.env.example}
    environment:
      S3MS_HTTP_ADDR: 0.0.0.0:8080
      S3MS_STORAGE_PROVIDER: ${S3MS_STORAGE_PROVIDER:-filesystem}
      S3MS_FILESYSTEM_ROOT: ${S3MS_FILESYSTEM_ROOT:-/var/lib/s3-message-service}
    ports:
      - "${S3MS_PORT:-8080}:8080"
    volumes:
      - app-data:/var/lib/s3-message-service

volumes:
  app-data:
